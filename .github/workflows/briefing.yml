yamlname: Daily Briefing

on:
  schedule:
    - cron: '0 22 * * *'  # 한국시간 오전 7시 (UTC 22시)
  workflow_dispatch:        # 수동 실행 버튼도 생김

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install anthropic requests

      - name: 브리핑 생성
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python generate_briefing.py

      - name: 파일 커밋
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add briefing.json
          git commit -m "브리핑 업데이트 $(date '+%Y-%m-%d')" || exit 0
          git push

      - name: Netlify 배포
        env:
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          pip install netlify-py 2>/dev/null || true
          curl -X POST "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID/builds" \
            -H "Authorization: Bearer $NETLIFY_TOKEN"
