yamlname: Daily Briefing

on:
  schedule:
    - cron: '50 23 * * *'  # 매일 한국시간 오전 8시 50분 (UTC 23:50)
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install anthropic

      - name: 브리핑 생성
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python generate_briefing.py

      - name: 파일 커밋 & 푸시
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add briefing.json
          git diff --staged --quiet || git commit -m "브리핑 업데이트 $(date '+%Y-%m-%d %H:%M')"
          git push
